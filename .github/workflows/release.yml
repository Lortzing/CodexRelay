name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  github-release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Verify tag matches project version
        shell: bash
        run: |
          project_version="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          print(tomllib.loads(Path('pyproject.toml').read_text())['project']['version'])
          PY
          )"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$tag_version" != "$project_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match project version $project_version" >&2
            exit 1
          fi

      - name: Install project
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Build wheel and source distribution
        run: uv build --no-sources

      - name: Smoke test wheel
        shell: bash
        run: |
          wheel="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$wheel"
          uv run --isolated --no-project --with "$wheel" cxr --help

      - name: Smoke test source distribution
        shell: bash
        run: |
          sdist="$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
          test -n "$sdist"
          uv run --isolated --no-project --with "$sdist" cxr --help

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --verify-tag \
              --generate-notes \
              --title "CodexRelay $GITHUB_REF_NAME"
          fi

  publish-pypi:
    name: Publish to PyPI
    if: ${{ vars.PUBLISH_TO_PYPI == 'true' }}
    needs: github-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - name: Build distributions
        run: uv build --no-sources

      - name: Publish with PyPI Trusted Publishing
        run: uv publish
