name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish, for example v0.7.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}-${{ inputs.tag }}
  cancel-in-progress: false

env:
  PYINSTALLER_VERSION: "6.21.0"
  NFPM_VERSION: "v2.47.0"
  GH_REPO: ${{ github.repository }}

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      source_ref: ${{ steps.version.outputs.source_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - id: version
        shell: bash
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          tag="$REQUESTED_TAG"
          version="${tag#v}"
          project_version="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          print(tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])
          PY
          )"
          [[ "$tag" == v* ]] || { echo "Release tag must start with v: $tag" >&2; exit 1; }
          [[ "$version" == "$project_version" ]] || {
            echo "Tag $tag does not match project version $project_version" >&2
            exit 1
          }
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            source_ref="${{ github.sha }}"
          else
            source_ref="$tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
      - run: |
          uv sync --extra dev
          uv run pytest

  prepare-release:
    name: Prepare GitHub Release
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Create release when missing
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; platform jobs will update its assets."
          else
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --generate-notes \
              --title "CoderRelay $RELEASE_TAG"
          fi

  windows-installers:
    name: Windows ${{ matrix.architecture }}
    needs: [validate, prepare-release]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86
            runner: windows-2022
            python-arch: x86
            expected-bits: 32
            expected-machine: ""
          - architecture: x86_64
            runner: windows-2022
            python-arch: x64
            expected-bits: 64
            expected-machine: AMD64
          - architecture: arm64
            runner: windows-11-arm
            python-arch: arm64
            expected-bits: 64
            expected-machine: ARM64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.source_ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: ${{ matrix.python-arch }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Verify architecture
        shell: pwsh
        env:
          EXPECTED_BITS: ${{ matrix.expected-bits }}
          EXPECTED_MACHINE: ${{ matrix.expected-machine }}
        run: |
          python -c "import os, platform, struct; bits=struct.calcsize('P')*8; machine=platform.machine(); assert bits == int(os.environ['EXPECTED_BITS']); expected=os.environ.get('EXPECTED_MACHINE', ''); assert not expected or machine.lower() == expected.lower()"
      - name: Build cdy.exe
        shell: pwsh
        run: |
          uv venv --python "$(python -c 'import sys; print(sys.executable)')" .release-venv
          uv pip install --python .release-venv "pyinstaller==$env:PYINSTALLER_VERSION" .
          .release-venv\Scripts\python.exe -m PyInstaller --clean --noconfirm --onefile --console --noupx --name cdy scripts\cdy_launcher.py
          .\dist\cdy.exe --help
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress
      - name: Build Setup EXE and portable ZIP
        shell: pwsh
        run: |
          .\scripts\build_windows_installer.ps1 -Binary .\dist\cdy.exe -Architecture "${{ matrix.architecture }}" -Version "${{ needs.validate.outputs.version }}" -OutputDir release-assets
      - name: Smoke test installer
        shell: pwsh
        run: |
          $setup = Get-ChildItem release-assets -Filter "CoderRelay-Setup-*.exe" | Select-Object -First 1
          if (-not $setup) { throw "Setup executable was not produced." }

          $installDir = Join-Path $env:RUNNER_TEMP "CoderRelay-Smoke-${{ matrix.architecture }}"
          $installLog = Join-Path $env:RUNNER_TEMP "CoderRelay-install-${{ matrix.architecture }}.log"
          $uninstallLog = Join-Path $env:RUNNER_TEMP "CoderRelay-uninstall-${{ matrix.architecture }}.log"
          Remove-Item $installDir -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $installLog, $uninstallLog -Force -ErrorAction SilentlyContinue

          $installArgs = @(
            "/VERYSILENT"
            "/SUPPRESSMSGBOXES"
            "/NORESTART"
            "/SP-"
            "/DIR=`"$installDir`""
            "/LOG=`"$installLog`""
          )
          $install = Start-Process -FilePath $setup.FullName -ArgumentList $installArgs -Wait -PassThru
          if ($install.ExitCode -ne 0) {
            if (Test-Path $installLog) { Get-Content $installLog | Write-Host }
            throw "Installer smoke test failed with exit code $($install.ExitCode)."
          }

          $installedBinary = Join-Path $installDir "cdy.exe"
          if (-not (Test-Path $installedBinary)) {
            if (Test-Path $installLog) { Get-Content $installLog | Write-Host }
            throw "Installer exited successfully but cdy.exe was not installed."
          }
          & $installedBinary --help
          if ($LASTEXITCODE -ne 0) { throw "Installed cdy.exe failed its --help smoke test." }

          $uninstaller = Get-ChildItem $installDir -Filter "unins*.exe" | Select-Object -First 1
          if (-not $uninstaller) { throw "The installed Inno Setup uninstaller was not found." }
          $uninstallArgs = @(
            "/VERYSILENT"
            "/SUPPRESSMSGBOXES"
            "/NORESTART"
            "/LOG=`"$uninstallLog`""
          )
          $uninstall = Start-Process -FilePath $uninstaller.FullName -ArgumentList $uninstallArgs -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) {
            if (Test-Path $uninstallLog) { Get-Content $uninstallLog | Write-Host }
            throw "Uninstaller smoke test failed with exit code $($uninstall.ExitCode)."
          }
      - uses: actions/upload-artifact@v7
        with:
          name: windows-${{ matrix.architecture }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7
      - name: Upload Windows assets to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          Get-ChildItem release-assets -File | ForEach-Object {
            gh release upload $env:RELEASE_TAG $_.FullName --clobber
            if ($LASTEXITCODE -ne 0) { throw "Failed to upload $($_.Name)" }
          }

  macos-installers:
    name: macOS ${{ matrix.architecture }}
    needs: [validate, prepare-release]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64
            runner: macos-15-intel
            python-arch: x64
            expected-machine: x86_64
          - architecture: arm64
            runner: macos-15
            python-arch: arm64
            expected-machine: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.source_ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: ${{ matrix.python-arch }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Verify architecture
        shell: bash
        env:
          EXPECTED_MACHINE: ${{ matrix.expected-machine }}
        run: python -c "import os, platform; assert platform.machine().lower() == os.environ['EXPECTED_MACHINE'].lower()"
      - name: Build native executable
        shell: bash
        run: |
          uv venv --python "$(python -c 'import sys; print(sys.executable)')" .release-venv
          uv pip install --python .release-venv "pyinstaller==${PYINSTALLER_VERSION}" .
          .release-venv/bin/python -m PyInstaller --clean --noconfirm --onefile --console --noupx --name cdy --target-arch "${{ matrix.architecture }}" scripts/cdy_launcher.py
          ./dist/cdy --help
      - name: Build PKG and DMG
        run: ./scripts/build_macos_dmg.sh --binary ./dist/cdy --architecture "${{ matrix.architecture }}" --version "${{ needs.validate.outputs.version }}" --output-dir release-assets
      - uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.architecture }}
          path: release-assets/*.dmg
          if-no-files-found: error
          retention-days: 7
      - name: Upload macOS assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: gh release upload "$RELEASE_TAG" release-assets/*.dmg --clobber

  linux-packages:
    name: Linux ${{ matrix.architecture }}
    needs: [validate, prepare-release]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64
            runner: ubuntu-22.04
            python-arch: x64
            expected-machine: x86_64
          - architecture: aarch64
            runner: ubuntu-24.04-arm
            python-arch: arm64
            expected-machine: aarch64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.source_ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: ${{ matrix.python-arch }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: false
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          go install "github.com/goreleaser/nfpm/v2/cmd/nfpm@${NFPM_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Verify architecture
        env:
          EXPECTED_MACHINE: ${{ matrix.expected-machine }}
        run: python -c "import os, platform; assert platform.machine().lower() == os.environ['EXPECTED_MACHINE'].lower()"
      - name: Build native executable
        run: |
          uv venv --python "$(python -c 'import sys; print(sys.executable)')" .release-venv
          uv pip install --python .release-venv "pyinstaller==${PYINSTALLER_VERSION}" .
          .release-venv/bin/python -m PyInstaller --clean --noconfirm --onefile --console --noupx --name cdy scripts/cdy_launcher.py
          ./dist/cdy --help
      - name: Build TAR.GZ, DEB, and RPM
        run: |
          ./scripts/build_linux_packages.sh --binary ./dist/cdy --architecture "${{ matrix.architecture }}" --version "${{ needs.validate.outputs.version }}" --output-dir release-assets
          dpkg-deb --info release-assets/*.deb
          rpm -qip release-assets/*.rpm
      - uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.architecture }}
          path: |
            release-assets/*.tar.gz
            release-assets/*.deb
            release-assets/*.rpm
          if-no-files-found: error
          retention-days: 7
      - name: Upload Linux assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: gh release upload "$RELEASE_TAG" release-assets/* --clobber

  checksums:
    name: Publish checksums
    needs: [validate, prepare-release, windows-installers, macos-installers, linux-packages]
    if: ${{ always() && needs.validate.result == 'success' && needs.prepare-release.result == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download successful build artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: downloaded-assets
      - name: Create checksums and report missing assets
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          mkdir -p release-assets
          mapfile -t files < <(find downloaded-assets -type f -print 2>/dev/null | sort)
          [[ "${#files[@]}" -gt 0 ]] || { echo "No platform artifacts were produced." >&2; exit 1; }
          for file in "${files[@]}"; do cp "$file" release-assets/; done
          (cd release-assets && sha256sum * > SHA256SUMS.txt)

          expected=(
            "CoderRelay-Setup-${VERSION}-windows-x86.exe"
            "CoderRelay-Portable-${VERSION}-windows-x86.zip"
            "CoderRelay-Setup-${VERSION}-windows-x86_64.exe"
            "CoderRelay-Portable-${VERSION}-windows-x86_64.zip"
            "CoderRelay-Setup-${VERSION}-windows-arm64.exe"
            "CoderRelay-Portable-${VERSION}-windows-arm64.zip"
            "CoderRelay-${VERSION}-macOS-x86_64.dmg"
            "CoderRelay-${VERSION}-macOS-arm64.dmg"
            "coder-relay-${VERSION}-linux-x86_64.tar.gz"
            "coder-relay_${VERSION}_amd64.deb"
            "coder-relay-${VERSION}-1.x86_64.rpm"
            "coder-relay-${VERSION}-linux-aarch64.tar.gz"
            "coder-relay_${VERSION}_arm64.deb"
            "coder-relay-${VERSION}-1.aarch64.rpm"
          )
          missing=()
          for asset in "${expected[@]}"; do
            [[ -f "release-assets/$asset" ]] || missing+=("$asset")
          done
          {
            echo "## Release asset summary"
            echo
            echo "Produced ${#files[@]} of ${#expected[@]} platform assets."
            if [[ "${#missing[@]}" -gt 0 ]]; then
              echo
              echo "Missing assets:"
              printf -- '- `%s`\n' "${missing[@]}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload checksum manifest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: gh release upload "$RELEASE_TAG" release-assets/SHA256SUMS.txt --clobber
