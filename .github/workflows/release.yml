name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read and verify version
        id: version
        shell: bash
        run: |
          project_version="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          print(tomllib.loads(Path('pyproject.toml').read_text())['project']['version'])
          PY
          )"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$tag_version" != "$project_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match project version $project_version" >&2
            exit 1
          fi
          echo "version=$project_version" >> "$GITHUB_OUTPUT"

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x86_64
            runner: windows-latest
            binary: dist/cxr.exe
          - target: macos-x86_64
            runner: macos-15-intel
            binary: dist/cxr
          - target: macos-arm64
            runner: macos-15
            binary: dist/cxr
          - target: linux-x86_64
            runner: ubuntu-latest
            binary: dist/cxr

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install project
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Build standalone executable
        run: uv run --with pyinstaller==6.21.0 pyinstaller --clean --noconfirm --onefile --name cxr scripts/cxr_launcher.py

      - name: Smoke test executable
        run: python -c "import subprocess; subprocess.run([r'${{ matrix.binary }}', '--help'], check=True)"

      - name: Create platform archive
        run: python scripts/package_release.py --binary "${{ matrix.binary }}" --target "${{ matrix.target }}" --version "${{ needs.validate.outputs.version }}"

      - name: Upload platform archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  github-release:
    name: Publish GitHub Release
    needs:
      - validate
      - build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download platform archives
        uses: actions/download-artifact@v8
        with:
          path: downloaded-assets

      - name: Collect and verify release assets
        shell: bash
        run: |
          mkdir -p release-assets
          mapfile -t files < <(find downloaded-assets -type f \( -name 'codex-relay-*.zip' -o -name 'codex-relay-*.tar.gz' \) -print | sort)
          if [[ "${#files[@]}" -ne 4 ]]; then
            printf 'Expected 4 platform archives, found %s\n' "${#files[@]}" >&2
            printf '%s\n' "${files[@]}" >&2
            exit 1
          fi
          for file in "${files[@]}"; do
            cp "$file" release-assets/
          done
          (cd release-assets && sha256sum codex-relay-* > SHA256SUMS)
          ls -lh release-assets

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --verify-tag \
              --generate-notes \
              --title "CodexRelay $GITHUB_REF_NAME"
          fi
