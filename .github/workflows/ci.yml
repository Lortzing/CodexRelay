name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            python: "3.11"
          - os: ubuntu-24.04
            python: "3.12"
          - os: ubuntu-24.04
            python: "3.13"
          - os: macos-15
            python: "3.13"
          - os: windows-2022
            python: "3.13"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - run: uv sync --extra dev
      - run: uv run pytest
      - run: uv run cdy --help
      - run: uv build --no-sources

  standalone-smoke:
    name: Standalone smoke build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"
      - run: |
          uv venv .standalone-venv
          uv pip install --python .standalone-venv pyinstaller==6.21.0 .
          .standalone-venv/bin/python -m PyInstaller --clean --noconfirm --onefile --console --noupx --name cdy scripts/cdy_launcher.py
          ./dist/cdy --help
