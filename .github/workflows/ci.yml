name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install project
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Check CLI entry points
        run: |
          uv run cxr --help
          uv run codex-relay --help

  standalone-smoke:
    name: Build standalone Linux binary
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install project
        run: uv sync --extra dev

      - name: Build standalone executable
        run: uv run --with pyinstaller==6.21.0 pyinstaller --clean --noconfirm --onefile --name cxr scripts/cxr_launcher.py

      - name: Smoke test executable
        run: ./dist/cxr --help

      - name: Package executable
        run: python scripts/package_release.py --binary dist/cxr --target linux-x86_64 --version 0.0.0-ci

      - name: Inspect archive
        run: tar -tzf release-assets/codex-relay-0.0.0-ci-linux-x86_64.tar.gz
