name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install project
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Check CLI entry points
        run: |
          uv run cxr --help
          uv run codex-relay --help

  build:
    name: Build and smoke test distributions
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Build wheel and source distribution
        run: uv build --no-sources

      - name: Smoke test wheel
        shell: bash
        run: |
          wheel="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$wheel"
          uv run --isolated --no-project --with "$wheel" cxr --help

      - name: Smoke test source distribution
        shell: bash
        run: |
          sdist="$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
          test -n "$sdist"
          uv run --isolated --no-project --with "$sdist" cxr --help
