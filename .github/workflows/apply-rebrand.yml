# Triggered through a merged pull request so GitHub emits a native push event.
# The workflow removes itself and the temporary payload in the final commit.
name: Apply CoderRelay Rebrand

on:
  push:
    branches: [main]
    paths:
      - ".coderrelay-payload/**"
      - ".github/workflows/apply-rebrand.yml"

permissions:
  contents: write

concurrency:
  group: coderrelay-rebrand
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Verify and unpack repository snapshot
        shell: bash
        run: |
          set -euo pipefail
          cat .coderrelay-payload/part-* > "$RUNNER_TEMP/coderrelay-rebrand.tar.gz.b64"
          echo "d2508a1778750ab2228be33dad1216d3e8eca892256bae7898c793d60481b18e  $RUNNER_TEMP/coderrelay-rebrand.tar.gz.b64" | sha256sum -c -
          base64 --decode "$RUNNER_TEMP/coderrelay-rebrand.tar.gz.b64" > "$RUNNER_TEMP/coderrelay-rebrand.tar.gz"
          echo "236e8b12e87a7150e2f6ddd5fbb052620e675db2ddab3cb742bde733046926ba  $RUNNER_TEMP/coderrelay-rebrand.tar.gz" | sha256sum -c -
          tar -tzf "$RUNNER_TEMP/coderrelay-rebrand.tar.gz" >/dev/null
      - name: Replace repository and push main
        shell: bash
        run: |
          set -euo pipefail
          git rm -r --ignore-unmatch .
          tar -xzf "$RUNNER_TEMP/coderrelay-rebrand.tar.gz" -C .
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Rebrand project as CoderRelay"
          git push origin HEAD:main
